name: "Continuous Cloud Compliance Scan Orchestrator"

on:
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  compliance_audit:
    name: "Evaluate Cloud Fleet Posture"
    runs-on: "ubuntu-latest"
    
    steps:
      - name: "Clone Source Infrastructure Framework"
        uses: "actions/checkout@v4"

      - name: "Mount Execution Python Environment"
        uses: "actions/setup-python@v5"
        with:
          python-version: "3.11"
          cache: "pip"

      - name: "Resolve Module Requirements"
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: "Assume Targeted Governance AWS IAM Execution Role via OIDC"
        uses: "aws-actions/configure-aws-credentials@v4"
        with:
          role-to-assume: "arn:aws:iam::${{ secrets.AWS_AUDIT_ACCOUNT_ID }}:role/GitHubActionsCloudComplianceScannerRole"
          aws-region: "us-east-1"

      - name: "Trigger Core Ingress Scanning Script Engine"
        run: |
          export PYTHONPATH="${PYTHONPATH}:$(pwd)/src"
          python src/main.py

      - name: "Persist Structural Compliance Artifacts Output Packages"
        uses: "actions/upload-artifact@v4"
        with:
          name: "Cloud-Compliance-Report-Matrix"
          path: "reports/"
          retention-days: 30